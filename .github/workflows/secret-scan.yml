name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip

      # We install the gitleaks CLI binary directly instead of using gitleaks-action:
      # the action requires a paid license for organization repos (this lives under
      # the experienceeducate org), the MIT-licensed binary does not. Pin the version
      # and verify the published SHA-256 checksum before trusting the download.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # Save the tarball under its real asset name: `sha256sum -c` reads the
          # filename from checksums.txt and verifies the file of that exact name.
          curl -fsSL -o "${asset}"    "${base}/${asset}"
          curl -fsSL -o checksums.txt "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${asset}\$" checksums.txt | sha256sum -c -
          tar -xzf "${asset}" gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # `gitleaks git` scans the commit history (git log -p), so a secret committed and
      # later deleted is still caught — that is the point, since it stays in GitHub's
      # history forever. A non-zero exit on any finding fails the job and blocks merge.
      - name: Scan commit history for secrets
        run: gitleaks git . --config .gitleaks.toml --redact --verbose
