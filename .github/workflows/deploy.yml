name: Deploy to production

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DOCKER_USER: patrickgichini
  CLUSTER_NAME: educate-apps-cluster
  NAMESPACE: data-ingestion
  API_URL: https://eba-dashboard-api.educateapps.work

jobs:
  changes:
    runs-on: ubuntu-latest
    # fetch-depth: 0 below should let paths-filter diff locally without ever
    # calling the GitHub API, but grant pull-requests: read as a backstop —
    # some code paths in the action still call listFiles regardless. Scoped
    # to this job only; every other job keeps its current (more restrictive)
    # default. Adding `permissions:` here makes this an allowlist for the
    # job, so contents: read must be listed too or checkout loses it.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run test suite
        working-directory: backend
        env:
          JWT_SECRET: ci-test-jwt-secret-not-a-real-secret
          DASHBOARD_PASSWORD: ci-test-dashboard-password
          EBA_ID_SALT: ci-test-eba-id-salt-0123456789abcdef
          EBA_CLIENT_TOKEN: eba-dashboard-v1
        run: pytest --cov=app --cov-report=term-missing

  build-backend:
    needs: [changes, test-backend]
    # A red test suite must block the image build. On pull_request events we
    # only want the test job (see test-backend above) — never build/push an
    # image or touch prod, so this is also restricted to push (deploy.yml's
    # only other trigger besides pull_request/workflow_dispatch).
    if: needs.changes.outputs.backend == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/eba-dashboard-server:latest
            ${{ env.DOCKER_USER }}/eba-dashboard-server:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USER }}/eba-dashboard-server:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USER }}/eba-dashboard-server:buildcache,mode=max

  build-frontend:
    needs: changes
    # No test-backend equivalent for the frontend yet — restricted to push
    # only (same reasoning as build-backend) so PRs never build/push images.
    if: needs.changes.outputs.frontend == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ env.API_URL }}
          tags: |
            ${{ env.DOCKER_USER }}/eba-dashboard-app:latest
            ${{ env.DOCKER_USER }}/eba-dashboard-app:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USER }}/eba-dashboard-app:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USER }}/eba-dashboard-app:buildcache,mode=max

  deploy:
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      (needs.build-backend.result == 'success'  || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }} --expiry-seconds 600

      # `kubectl set image` with image@sha256:<digest> pins the live deployment to
      # the exact bytes pushed by this run. If a later attacker re-pushes :latest,
      # the running pods will not pick it up — only a new workflow run with a new
      # commit (and therefore a new digest) can update what runs in production.

      - name: Pin backend to image digest
        if: needs.changes.outputs.backend == 'true'
        run: |
          DIGEST='${{ needs.build-backend.outputs.digest }}'
          test -n "$DIGEST" || { echo "::error::missing backend digest"; exit 1; }
          kubectl set image deployment/eba-dashboard-server \
            eba-dashboard-server=${{ env.DOCKER_USER }}/eba-dashboard-server@${DIGEST} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/eba-dashboard-server -n ${{ env.NAMESPACE }} --timeout=3m

      - name: Pin frontend to image digest
        if: needs.changes.outputs.frontend == 'true'
        run: |
          DIGEST='${{ needs.build-frontend.outputs.digest }}'
          test -n "$DIGEST" || { echo "::error::missing frontend digest"; exit 1; }
          kubectl set image deployment/eba-dashboard-app \
            eba-dashboard-app=${{ env.DOCKER_USER }}/eba-dashboard-app@${DIGEST} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/eba-dashboard-app -n ${{ env.NAMESPACE }} --timeout=3m

      - name: Summary
        run: |
          {
            echo "### Deploy complete"
            echo ""
            echo "| Component | Rolled out | Digest |"
            echo "|---|---|---|"
            echo "| Backend  | ${{ needs.changes.outputs.backend }}  | \`${{ needs.build-backend.outputs.digest }}\` |"
            echo "| Frontend | ${{ needs.changes.outputs.frontend }} | \`${{ needs.build-frontend.outputs.digest }}\` |"
            echo ""
            echo "Image tag: \`${{ github.sha }}\` (also pushed as \`:latest\`)"
            echo "Live pods reference the image by digest, not by tag."
          } >> $GITHUB_STEP_SUMMARY
