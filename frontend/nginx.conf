server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # nginx note: `add_header` is NOT inherited by a location block once that
    # location has its own `add_header`. Use the snippet pattern below so the
    # security headers are present on every route.

    # ---- SPA routing ----
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # ---- Cache hashed Vite assets aggressively ----
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # ---- Never cache the HTML shell ----
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    # ---- Block hidden / dotfile requests ----
    location ~ /\. {
        deny all;
        return 404;
    }
}
