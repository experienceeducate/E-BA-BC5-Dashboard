add_header X-Content-Type-Options    "nosniff"                                              always;
add_header X-Frame-Options           "DENY"                                                 always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"                      always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                  always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://eba-dashboard-api.educateapps.work; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
