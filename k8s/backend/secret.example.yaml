# TEMPLATE — copy to k8s/backend/secret.yaml (which is gitignored via *secret.yaml),
# fill in real values, and apply with:
#   kubectl apply -f k8s/backend/secret.yaml
#
# NEVER commit the filled-in secret.yaml. Generate strong random values with:
#   python -c "import secrets; print(secrets.token_hex(32))"
# The GCP service-account key is a SEPARATE Secret (gcp-service-account-key) —
# create it from the downloaded JSON key, e.g.:
#   kubectl create secret generic gcp-service-account-key \
#     --from-file=service-account.json=./key.json -n data-ingestion
apiVersion: v1
kind: Secret
metadata:
  name: eba-dashboard-credentials
  namespace: data-ingestion
type: Opaque
stringData:
  jwt-secret: "REPLACE_WITH_TOKEN_HEX_32"
  dashboard-password: "REPLACE_WITH_STRONG_GUEST_PASSWORD"
  eba-id-salt: "REPLACE_WITH_TOKEN_HEX_32"
  google-oauth-client-id: "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_ID"
  google-oauth-client-secret: "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_SECRET"
  google-oauth-redirect-uri: "https://eba-dashboard-api.educateapps.work/api/auth/google/callback"
